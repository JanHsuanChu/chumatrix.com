<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chu Matrix</title>
    <!-- GitHub Pages has no server-side routing, so a direct visit to e.g.
         /about-us returns this 404 page. This script encodes the requested
         path into a query string and redirects to the real index.html,
         which decodes it and restores the URL. This is the standard
         "spa-github-pages" redirect trick. -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 0
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      )
    </script>
  </head>
  <body></body>
</html>
